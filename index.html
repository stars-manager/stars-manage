<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GitHub Star Manager - 高效管理你的 GitHub Stars，支持智能标签、搜索过滤、批量操作" />
    <meta name="keywords" content="GitHub, Star, Manager, 开源项目, 管理, 标签" />
    <meta name="author" content="rss1102" />

    <!-- SEO 优化 -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://github-stars-manager.example.com" />

    <!-- Open Graph / 社交媒体 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GitHub Star Manager" />
    <meta property="og:description" content="高效管理你的 GitHub Stars" />
    <meta property="og:image" content="/og-image.png" />

    <!-- 性能优化 -->
    <link rel="preconnect" href="https://api.github.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.github.com" />

    <!-- 主题色 -->
    <meta name="theme-color" content="#0052D9" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- 预加载关键资源 -->
    <link rel="preload" href="/src/main.tsx" as="script" />

    <title>GitHub Star Manager</title>

    <!-- 内联关键 CSS（避免 FOUC） -->
    <style>
      /* 防止闪烁 */
      html {
        background-color: #f5f5f5;
      }

      /* 加载动画 */
      #root:empty::before {
        content: '';
        display: block;
        width: 40px;
        height: 40px;
        margin: 100px auto;
        border: 4px solid #e0e0e0;
        border-top-color: #0052D9;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; text-align: center;">
        <h1>JavaScript Required</h1>
        <p>Please enable JavaScript to use this application.</p>
      </div>
    </noscript>

    <div id="root"></div>

    <!-- 异步加载非关键脚本 -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
